<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMS OTP Generator & Share</title>
    
    <!-- PWA & Mobile Compatibility Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/images/TRUSTY OTP LOGO.png" />
    <meta name="theme-color" content="#eab308" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Taxi OTP" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body class="bg-[#f8fafc] text-[#0f172a] antialiased selection:bg-yellow-400 selection:text-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("PWA Service Worker registered with scope: ", registration.scope);
            })
            .catch((error) => {
              console.error("PWA Service Worker registration failed: ", error);
            });
        });
      }
    </script>
  </body>
</html>
